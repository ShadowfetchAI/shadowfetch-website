name: Bug report
description: Report a problem with the site, build pipeline, feeds, or deployment.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is happening?
      placeholder: A short description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the steps needed to reproduce the issue.
      placeholder: |
        1. Go to...
        2. Click...
        3. See issue...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened instead?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Front page
        - Section page
        - Search
        - Journal
        - Feed generation
        - Cloudflare deployment
        - API route
        - Other
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Extra context
      description: Browser, device, screenshots, logs, or any other useful details.
