name: Feature request
description: Suggest an improvement to the newsroom, design, workflow, or feed system.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Opportunity
      description: What should be improved or added?
      placeholder: Describe the gap or idea.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: What would you like to see?
      placeholder: Outline the feature or improvement.
    validations:
      required: true

  - type: dropdown
    id: type
    attributes:
      label: Category
      options:
        - Editorial design
        - News coverage
        - Feed quality
        - Search and archive
        - Journal and writing
        - Deployment and infrastructure
        - Performance
        - Monetization
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Extra context
      description: Add mockups, references, examples, or other details if helpful.
