<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 520" role="img" aria-labelledby="title desc">
  <title id="title">Shadowfetch AI Lab mark</title>
  <desc id="desc">A Shadowfetch AI Lab wordmark with a hound silhouette and circuit line accents.</desc>
  <defs>
    <linearGradient id="aqua" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#7df2ff"/>
      <stop offset="100%" stop-color="#3aa5ff"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" x2="100%" y1="0%" y2="0%">
      <stop offset="0%" stop-color="#dfc49b"/>
      <stop offset="100%" stop-color="#b48b56"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1400" height="520" rx="36" fill="#0e1320"/>

